<style>
/* ====================================================== */
/* CSS RESET & BASE STYLES */
/* ====================================================== */

*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    font-size: 16px;
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    line-height: 1.6;
    color: var(--text-primary);
    background-color: var(--background);
    overflow-x: hidden;
}

img {
    max-width: 100%;
    height: auto;
    display: block;
}

a {
    text-decoration: none;
    color: inherit;
}

button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    background: none;
}

ul, ol {
    list-style: none;
}

/* ====================================================== */
/* CSS CUSTOM PROPERTIES (DESIGN TOKENS) */
/* ====================================================== */

:root {
    /* Color Palette */
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --primary-light: #3b82f6;
    --secondary: #7c3aed;
    --secondary-dark: #6d28d9;
    --accent: #f59e0b;
    --accent-dark: #d97706;
    
    /* Neutral Colors */
    --background: #ffffff;
    --surface: #f8fafc;
    --surface-hover: #f1f5f9;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    
    /* Text Colors */
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-tertiary: #94a3b8;
    --text-inverse: #ffffff;
    
    /* Status Colors */
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --info: #3b82f6;
    
    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    
    /* Spacing Scale */
    --space-xs: 0.25rem;
    --space-sm: 0.5rem;
    --space-md: 1rem;
    --space-lg: 1.5rem;
    --space-xl: 2rem;
    --space-2xl: 3rem;
    --space-3xl: 4rem;
    
    /* Border Radius */
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --radius-full: 9999px;
    
    /* Typography */
    --font-weight-normal: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
    --font-weight-extrabold: 800;
    
    /* Transitions */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Layout */
    --container-max-width: 1280px;
    --header-height: 70px;
}

/* ====================================================== */
/* UTILITY CLASSES */
/* ====================================================== */

.container {
    width: 100%;
    max-width: var(--container-max-width);
    margin-left: auto;
    margin-right: auto;
    padding-left: clamp(1rem, 5vw, 2rem);
    padding-right: clamp(1rem, 5vw, 2rem);
}

.visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
}

/* ====================================================== */
/* TYPOGRAPHY SYSTEM */
/* ====================================================== */

h1, h2, h3, h4, h5, h6 {
    font-weight: var(--font-weight-bold);
    line-height: 1.2;
    color: var(--text-primary);
}

h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: var(--font-weight-extrabold);
    letter-spacing: -0.02em;
}

h2 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    letter-spacing: -0.01em;
}

h3 {
    font-size: clamp(1.5rem, 3vw, 2rem);
}

h4 {
    font-size: clamp(1.25rem, 2.5vw, 1.5rem);
}

p {
    font-size: clamp(0.9375rem, 2vw, 1.125rem);
    line-height: 1.7;
    color: var(--text-secondary);
}

.text-small {
    font-size: clamp(0.8125rem, 1.5vw, 0.875rem);
}

/* ====================================================== */
/* HEADER & NAVIGATION */
/* ====================================================== */

.header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background-color: var(--background);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: all var(--transition-base);
}

.header.scrolled {
    box-shadow: var(--shadow-md);
}

.header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-height);
    gap: var(--space-lg);
}

.logo {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: clamp(1.25rem, 3vw, 1.5rem);
    font-weight: var(--font-weight-bold);
    color: var(--primary);
    transition: transform var(--transition-fast);
}

.logo:hover {
    transform: scale(1.05);
}

.logo-icon {
    width: 32px;
    height: 32px;
    fill: var(--primary);
}

.nav-desktop {
    display: none;
}

.nav-list {
    display: flex;
    align-items: center;
    gap: var(--space-xl);
}

.nav-link {
    font-size: 0.9375rem;
    font-weight: var(--font-weight-medium);
    color: var(--text-secondary);
    transition: color var(--transition-fast);
    position: relative;
}

.nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background-color: var(--primary);
    transition: width var(--transition-base);
}

.nav-link:hover {
    color: var(--primary);
}

.nav-link:hover::after {
    width: 100%;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: var(--space-md);
}

.icon-button {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
    color: var(--text-secondary);
}

.icon-button:hover {
    background-color: var(--surface);
    color: var(--primary);
}

.icon-button:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}

.icon-button svg {
    width: 20px;
    height: 20px;
}

.mobile-menu-button {
    display: flex;
}

/* Mobile Navigation */
.mobile-nav {
    position: fixed;
    top: var(--header-height);
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--background);
    transform: translateX(100%);
    transition: transform var(--transition-base);
    overflow-y: auto;
    z-index: 999;
}

.mobile-nav.active {
    transform: translateX(0);
}

.mobile-nav-list {
    padding: var(--space-xl);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.mobile-nav-link {
    padding: var(--space-md);
    font-size: 1.125rem;
    font-weight: var(--font-weight-medium);
    color: var(--text-primary);
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
}

.mobile-nav-link:hover {
    background-color: var(--surface);
    color: var(--primary);
}

/* ====================================================== */
/* HERO SECTION */
/* ====================================================== */

.hero {
    position: relative;
    padding: clamp(3rem, 10vw, 6rem) 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: var(--text-inverse);
    overflow: hidden;
}

.hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
    pointer-events: none;
}

.hero-content {
    position: relative;
    z-index: 1;
    display: grid;
    gap: var(--space-2xl);
    align-items: center;
}

.hero-text {
    text-align: center;
}

.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-sm) var(--space-lg);
    background-color: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-full);
    font-size: 0.875rem;
    font-weight: var(--font-weight-medium);
    margin-bottom: var(--space-lg);
}

.hero h1 {
    color: var(--text-inverse);
    margin-bottom: var(--space-lg);
}

.hero-description {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: var(--space-2xl);
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

.hero-cta-group {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-md);
    justify-content: center;
}

.hero-features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--space-lg);
    margin-top: var(--space-3xl);
}

.hero-feature {
    text-align: center;
    padding: var(--space-lg);
    background-color: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: var(--radius-lg);
    transition: transform var(--transition-base);
}

.hero-feature:hover {
    transform: translateY(-4px);
}

.hero-feature-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto var(--space-md);
    fill: var(--text-inverse);
}

.hero-feature h3 {
    font-size: 1.125rem;
    color: var(--text-inverse);
    margin-bottom: var(--space-sm);
}

.hero-feature p {
    font-size: 0.9375rem;
    color: rgba(255, 255, 255, 0.9);
}

/* ====================================================== */
/* BUTTON COMPONENTS */
/* ====================================================== */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    padding: clamp(0.75rem, 2vw, 1rem) clamp(1.5rem, 4vw, 2rem);
    font-size: clamp(0.9375rem, 2vw, 1rem);
    font-weight: var(--font-weight-semibold);
    border-radius: var(--radius-lg);
    transition: all var(--transition-base);
    cursor: pointer;
    white-space: nowrap;
    text-align: center;
    border: 2px solid transparent;
}

.btn:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}

.btn-primary {
    background-color: var(--primary);
    color: var(--text-inverse);
    box-shadow: var(--shadow-md);
}

.btn-primary:hover {
    background-color: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background-color: var(--background);
    color: var(--primary);
    border-color: var(--background);
}

.btn-secondary:hover {
    background-color: var(--surface);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.btn-outline {
    background-color: transparent;
    color: var(--text-inverse);
    border-color: var(--text-inverse);
}

.btn-outline:hover {
    background-color: var(--text-inverse);
    color: var(--primary);
}

.btn-small {
    padding: var(--space-sm) var(--space-lg);
    font-size: 0.875rem;
}

.btn-large {
    padding: 1.25rem 2.5rem;
    font-size: 1.125rem;
}

.btn-icon {
    width: 20px;
    height: 20px;
}

/* ====================================================== */
/* SECTION STYLES */
/* ====================================================== */

.section {
    padding: clamp(3rem, 8vw, 5rem) 0;
}

.section-header {
    text-align: center;
    margin-bottom: clamp(2rem, 6vw, 4rem);
}

.section-badge {
    display: inline-block;
    padding: var(--space-sm) var(--space-lg);
    background-color: var(--surface);
    color: var(--primary);
    font-size: 0.875rem;
    font-weight: var(--font-weight-semibold);
    border-radius: var(--radius-full);
    margin-bottom: var(--space-md);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.section-title {
    margin-bottom: var(--space-md);
}

.section-description {
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
}

/* ====================================================== */
/* PRODUCTS GRID */
/* ====================================================== */

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: clamp(1.5rem, 4vw, 2rem);
    margin-bottom: var(--space-2xl);
}

/* ====================================================== */
/* PRODUCT CARD COMPONENT */
/* ====================================================== */

.product-card {
    background-color: var(--background);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    transition: all var(--transition-base);
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
}

.product-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-xl);
    transform: translateY(-4px);
}

.product-card:focus-within {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
}

.product-image-wrapper {
    position: relative;
    width: 100%;
    padding-top: 100%;
    background-color: var(--surface);
    overflow: hidden;
    cursor: pointer;
}

.product-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--transition-slow);
}

.product-card:hover .product-image {
    transform: scale(1.08);
}

.product-badges {
    position: absolute;
    top: var(--space-md);
    left: var(--space-md);
    right: var(--space-md);
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-sm);
    z-index: 2;
}

.badge {
    padding: var(--space-xs) var(--space-md);
    font-size: 0.75rem;
    font-weight: var(--font-weight-bold);
    border-radius: var(--radius-full);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
}

.badge-sale {
    background-color: var(--error);
    color: var(--text-inverse);
}

.badge-new {
    background-color: var(--success);
    color: var(--text-inverse);
}

.badge-trending {
    background-color: var(--accent);
    color: var(--text-inverse);
}

.badge-limited {
    background-color: var(--secondary);
    color: var(--text-inverse);
}

.product-wishlist {
    position: absolute;
    top: var(--space-md);
    right: var(--space-md);
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--background);
    border-radius: var(--radius-full);
    box-shadow: var(--shadow-md);
    transition: all var(--transition-fast);
    z-index: 2;
    opacity: 0;
}

.product-card:hover .product-wishlist {
    opacity: 1;
}

.product-wishlist:hover {
    background-color: var(--error);
    color: var(--text-inverse);
    transform: scale(1.1);
}

.product-wishlist svg {
    width: 20px;
    height: 20px;
}

.product-content {
    padding: var(--space-lg);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    flex-grow: 1;
}

.product-category {
    font-size: 0.8125rem;
    font-weight: var(--font-weight-medium);
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.product-title {
    font-size: 1.125rem;
    font-weight: var(--font-weight-semibold);
    color: var(--text-primary);
    line-height: 1.4;
    cursor: pointer;
    transition: color var(--transition-fast);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.product-title:hover {
    color: var(--primary);
}

.product-description {
    font-size: 0.9375rem;
    color: var(--text-secondary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex-grow: 1;
}

.product-rating {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
}

.rating-stars {
    display: flex;
    gap: 2px;
}

.rating-star {
    width: 16px;
    height: 16px;
    fill: var(--accent);
}

.rating-star.empty {
    fill: var(--border);
}

.rating-count {
    font-size: 0.875rem;
    color: var(--text-tertiary);
}

.product-footer {
    padding: 0 var(--space-lg) var(--space-lg);
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.product-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: var(--space-sm);
}

.product-price-group {
    display: flex;
    align-items: baseline;
    gap: var(--space-sm);
    flex-wrap: wrap;
}

.product-price {
    font-size: 1.75rem;
    font-weight: var(--font-weight-bold);
    color: var(--primary);
    line-height: 1;
}

.product-price-original {
    font-size: 1.125rem;
    color: var(--text-tertiary);
    text-decoration: line-through;
}

.product-discount {
    padding: var(--space-xs) var(--space-sm);
    background-color: var(--error);
    color: var(--text-inverse);
    font-size: 0.8125rem;
    font-weight: var(--font-weight-bold);
    border-radius: var(--radius-sm);
}

.product-actions {
    display: flex;
    gap: var(--space-sm);
}

.btn-add-to-cart {
    flex: 1;
}

.btn-quick-view {
    flex-shrink: 0;
    aspect-ratio: 1;
    padding: 0;
    width: 48px;
}

.product-features {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-md);
    padding-top: var(--space-md);
    border-top: 1px solid var(--border-light);
}

.product-feature {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: 0.8125rem;
    color: var(--text-secondary);
}

.product-feature svg {
    width: 16px;
    height: 16px;
